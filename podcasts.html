<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Playlist Podcast Privée</title>
<style>
body { font-family: Arial, sans-serif; margin: 40px; }
h2 { margin-bottom: 10px; }
ul { list-style: none; padding: 0; }
li { margin: 8px 0; cursor: pointer; }
li.active { font-weight: bold; color: #007bff; }
</style>
</head>

<body>

<h2>🎧 Playlist – Podcasts privés</h2>

<audio id="player" controls></audio>

<ul id="playlist">
  <li data-src="https://drive.google.com/uc?export=download&id=1-UsbBLBiC9ycw72sTrn_XrmKi-DnBSuW">Épisode 1</li>
  <li data-src="https://drive.google.com/uc?export=download&id=1f2dPWgO-g4WYXEOebInbCYie9Y_Cyi92">Épisode 2</li>
  <li data-src="https://drive.google.com/uc?export=download&id=1j9bu9L8f1LnSvajn4Ff5jnVuQo4-7rlX">Épisode 3</li>
  <li data-src="https://drive.google.com/uc?export=download&id=1IVzpf8deL2pK1CIApCfZP9z6jJ6EbmWU">Épisode 4</li>
</ul>

<script>
const player = document.getElementById('player');
const items = document.querySelectorAll('#playlist li');
let current = 0;

function loadTrack(index) {
  items[current].classList.remove('active');
  current = index;
  player.src = items[current].getAttribute('data-src');
  items[current].classList.add('active');
  player.play();
}

items.forEach((item, index) => {
  item.addEventListener('click', () => loadTrack(index));
});

player.addEventListener('ended', () => {
  let next = current + 1;
  if (next < items.length) loadTrack(next);
});

loadTrack(0);
</script>

</body>
</html>
